# ============================================
#  Free Model Gateway - Configuration Example
#  Port: 10086
#
#  Usage:
#    cp config.example.yaml config.yaml
#    edit config.yaml as needed
#    set API keys via env vars (see .env.example)
# ============================================

gateway:
  host: "0.0.0.0"
  port: 10086
  max_retries: 3
  retry_delay_ms: 500
  connect_timeout_s: 60
  read_timeout_s: 120

strategy:
  mode: "priority"
  cooldown_seconds: 300
  max_cooldown_s: 3600

log:
  level: "info"
  format: "json"

providers:
  # ====== P0: OpenCode Zen (highest priority) ======
  - id: opencode-zen
    name: "OpenCode Zen"
    base_url: "https://opencode.ai/zen/v1/chat/completions"
    api_key_env: "OPENCODE_API_KEY"
    priority: 10
    weight: 10
    models:
      - id: deepseek-v4-flash-free
        name: "DeepSeek V4 Flash Free"
        context_window: 128000
        output_limit: 128000
